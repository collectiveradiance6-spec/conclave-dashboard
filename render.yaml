services:
  - type: web
    name: theconclave-dominion-api
    runtime: node
    region: ohio
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: BOT_PORT
        value: 3001
      - key: FRONTEND_URL
        value: https://theconclavedominion.com
      - key: DISCORD_REDIRECT_URI
        value: https://api.theconclavedominion.com/auth/discord/callback
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_GUILD_ID
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NITRADO_API_KEY
        sync: false
      - key: BATTLEMETRICS_TOKEN
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: ROLE_OWNER_ID
        sync: false
      - key: ROLE_ADMIN_ID
        sync: false
      - key: ROLE_HELPER_ID
        sync: false
      - key: ROLE_BOOSTER_ID
        sync: false
      - key: ROLE_DONATOR_ID
        sync: false
      - key: ROLE_ADVERTISER_ID
        sync: false
      - key: ROLE_SURVIVOR_ID
        sync: false
      - key: AEGIS_CHANNEL_ID
        sync: false
      - key: BEACON_CLIENT_ID
        sync: false
      - key: BEACON_CLIENT_SECRET
        sync: false
      - key: BEACON_ACCESS_TOKEN
        sync: false
      - key: BEACON_REFRESH_TOKEN
        sync: false
      - key: BEACON_TOKEN_EXPIRY
        sync: false
      - key: BEACON_GROUP_ID
        sync: false
