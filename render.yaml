# ═══════════════════════════════════════════════════════════════
# CONCLAVE AEGIS — render.yaml
# Deploy this file to auto-configure Render services
# ═══════════════════════════════════════════════════════════════

services:

  # ─── API + BOT (Web Service) ──────────────────────────────────
  - type: web
    name: conclave-aegis-api
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: BOT_PORT
        value: 3001

      # ── Fill these in Render dashboard ──
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://theconclavedominion.com
      - key: ADMIN_URL
        value: https://theconclavedominion.com/admin
      - key: API_BASE_URL
        value: https://api.theconclavedominion.com

      # Discord
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_GUILD_ID
        value: "1438103556610723922"
      - key: DISCORD_REDIRECT_URI
        value: https://api.theconclavedominion.com/auth/discord/callback
      - key: BEACON_REDIRECT_URI
        value: https://api.theconclavedominion.com/auth/beacon/callback

      # Discord Roles
      - key: ROLE_OWNER_ID
        sync: false
      - key: ROLE_ADMIN_ID
        sync: false
      - key: ROLE_HELPER_ID
        sync: false

      # Supabase
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false

      # Anthropic (AEGIS AI)
      - key: ANTHROPIC_API_KEY
        sync: false

      # Beacon Sentinel
      - key: BEACON_CLIENT_ID
        sync: false
      - key: BEACON_CLIENT_SECRET
        sync: false
      - key: BEACON_ACCESS_TOKEN
        sync: false
      - key: BEACON_REFRESH_TOKEN
        sync: false
      - key: BEACON_TOKEN_EXPIRES
        sync: false
      - key: BEACON_GROUP_ID
        sync: false

      # Shop
      - key: SHOP_WEBHOOK_URL
        sync: false
      - key: SHOP_TICKETS_CHANNEL
        value: "1492878413533282394"
      - key: SHOP_LOG_CHANNEL
        value: "1492870196958859436"

      # Nitrado
      - key: NITRADO_TOKEN
        sync: false

      # Live Monitor (set after /setup-monitoring runs)
      - key: MONITOR_STATUS_CHANNEL_ID
        sync: false
      - key: MONITOR_ACTIVITY_CHANNEL_ID
        sync: false
      - key: MONITOR_MESSAGE_ID
        sync: false
