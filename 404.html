<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>404 — TheConclave Dominion</title>
<link rel="icon" href="/conclave-badge.png">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Exo+2:wght@300;400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#02010d;color:#fff;font-family:'Exo 2',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;}
.wrap{padding:40px 24px;}
.code{font-family:'Cinzel Decorative',serif;font-size:clamp(5rem,22vw,11rem);font-weight:900;line-height:1;background:linear-gradient(135deg,#7B2FFF,#00D4FF,#FF4CD2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 60px rgba(0,212,255,.35));}
.label{font-family:'Share Tech Mono',monospace;font-size:.72rem;letter-spacing:.24em;text-transform:uppercase;color:rgba(255,255,255,.3);margin:1rem 0 .5rem;}
.sub{font-size:1.05rem;color:rgba(255,255,255,.45);margin-bottom:2.5rem;line-height:1.9;}
.btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
a.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 26px;border-radius:100px;background:rgba(123,47,255,.12);border:1px solid rgba(123,47,255,.3);color:#fff;text-decoration:none;font-family:'Share Tech Mono',monospace;font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;transition:all .2s;}
a.btn:hover{background:rgba(123,47,255,.28);border-color:rgba(123,47,255,.5);}
</style>
</head>
<body>
<div class="wrap">
  <div class="code">404</div>
  <div class="label">Realm Sector Not Found</div>
  <p class="sub">This territory lies beyond the Dominion's borders.<br>Perhaps the path shifted, or you strayed into the void.</p>
  <div class="btns">
    <a href="/" class="btn">🏠 Return Home</a>
    <a href="/ark" class="btn">🦖 ARK Servers</a>
    <a href="/worldconnecthub" class="btn">🌐 World Hub</a>
    <a href="https://discord.gg/theconclave" target="_blank" class="btn">💬 Discord</a>
  </div>
</div>
<script src="/conclave-system.js" defer></script>
</body>
</html>
